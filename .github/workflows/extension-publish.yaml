name: AndroidX Media3 FFmpeg Decoder / Publish

on:
  push:
    tags:
      - v*

env:
  NDK_VER: 26.1.10909125
  CMAKE_VER: 3.31.1

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
      - name: Cache NDK
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VER }}
          key: ${{ runner.os }}-${{ env.NDK_VER }}
      - name: Install correct NDK and CMake
        run: sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${NDK_VER}" "cmake;${CMAKE_VER}"
      - name: Build ffmpeg
        run: ./build.sh
      - name: Set JELLYFIN_VERSION
        run: echo "JELLYFIN_VERSION=$(echo ${GITHUB_REF#refs/tags/v} | tr / -)" >> $GITHUB_ENV
      - name: Build extension and publish library locally
        run: ./gradlew :media3-ffmpeg-decoder:publishToMavenLocal
      - name: Collect Maven artifacts
        run: |
          mkdir -p release-artifacts
          cp "${HOME}/.m2/repository/org/jellyfin/media3/media3-ffmpeg-decoder/${JELLYFIN_VERSION}/"* release-artifacts/
      - name: Upload Maven artifacts
        uses: actions/upload-artifact@v4
        with:
          name: media3-ffmpeg-decoder-${{ env.JELLYFIN_VERSION }}
          path: release-artifacts/
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${JELLYFIN_VERSION}"
          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "$TAG" release-artifacts/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "$TAG" release-artifacts/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$TAG" \
              --notes "Opus-enabled FFmpeg decoder build."
          fi
